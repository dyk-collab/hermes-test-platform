# Hermes Agent 评测用例集
#
# 每条用例: id / type / prompt / (toolsets) / graders[]
#   - id        唯一, 决定产物文件名
#   - type      仅用于报告分组 (qa / tool_use / task ...)
#   - prompt    喂给 hermes chat -q 的内容
#   - toolsets  可选, 映射到 hermes -t (注意: skill 工具集名是 `skills` 复数!)
#   - graders[] 一条用例可挂多个 grader, 全 pass 才算整体 pass
#
# Grader kinds (见 evalkit/graders/):
#   tool_call: must_call / must_call_any / must_not_call / args_match / expect_success
#   timing:    max_seconds / max_api_calls / max_tool_calls / max_output_tokens /
#              max_total_tokens / max_cost_usd
#
# 注意: 暂不放 terminal 工具的用例 —— headless 下 terminal 有独立 shell 审批拦截
#       (即便 --yolo 也可能 deny 并卡 ~70s), 需先配 shell 允许列表。

- id: qa-arithmetic
  type: qa
  prompt: "用一句话回答：1+1 等于几？"
  graders:
    - kind: timing
      max_seconds: 60
      max_api_calls: 2
    - kind: llm_judge
      rubric: "回答是否正确（结果为 2）且简洁（一句话）。"
      pass_threshold: 7

- id: qa-explain-concept
  type: qa
  prompt: "用两三句话解释什么是 HTTP 状态码 404，以及它通常意味着什么。"
  graders:
    - kind: llm_judge
      rubric: >
        准确性：是否说明 404 表示"未找到 / Not Found"，即请求的资源在服务器上不存在；
        完整性：是否点出这是客户端侧的资源定位问题而非服务器崩溃；
        清晰度：表达是否简洁易懂。三点都达标给高分。
      pass_threshold: 7
    - kind: timing
      max_seconds: 90

- id: skills-list-basic
  type: tool_use
  prompt: "列出你当前可用的所有 skill。"
  toolsets: [skills]
  graders:
    - kind: tool_call
      must_call_any: [skills_list, skill_view]
      expect_success: true
    - kind: timing
      max_seconds: 90

- id: skill-view-self
  type: tool_use
  prompt: "先列出可用的 skill，然后挑其中一个查看它的完整内容。"
  toolsets: [skills]
  graders:
    - kind: tool_call
      must_call: skill_view
      expect_success: true
    - kind: timing
      max_seconds: 120
      max_tool_calls: 10
