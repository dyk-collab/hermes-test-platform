# database-top-scene-handler 具体故障原因诊断测试集
#
# 目的：
# - 测试 Hermes 是否路由到 database-top-scene-handler skill。
# - 测试 Hermes 是否能在诊断报告中识别出你定义的具体故障原因。
# - 不测试 list_aksk_credentials / list_database_info 等 tool 路由；tool 路由测试放在 database-top-scene-handler.yaml。
#
# 每条用例必须包含：
# - 实例名称：rds-aiops-0001
# - 明确故障时间点
# - 明确故障类型
#
# 评分规则：
# - 每条 rubric 中的具体故障原因使用 <TODO: ...> 占位，由你填写。
# - pass_threshold 可按需调整，默认先放 7。

- id: root-cause-cpu-sustained-high
  type: qa
  prompt: "请诊断实例 rds-aiops-0001 在 2026-06-08 14:35 出现 CPU 使用率持续 95% 的故障，并给出诊断报告。"
  graders:
    - kind: tool_call
      must_call: skill_view
      args_match:
        name: database-top-scene-handler
      expect_success: true
    - kind: llm_judge
      expected_root_cause: "<TODO: 填写该用例的具体故障原因>"
      rubric: >
        请从 0 到 10 分评价 Hermes 生成的诊断报告。

        满分标准：
        1. 明确识别故障实例为 rds-aiops-0001。
        2. 明确识别故障时间与用户问题中的故障时间一致。
        3. 明确识别故障类型为 CPU 使用率持续过高。
        4. 报告应说明可能原因，例如慢 SQL、连接数升高、热点 SQL、后台任务、资源争用等。
        5. 报告应结合可观测数据或工具结果进行分析，不能只给泛泛建议。
        6. 报告应给出排查结论或最可能原因。
        7. 报告应给出可执行的处理建议，例如优化 SQL、限制异常请求、扩容、调整参数、修复复制或继续观察指标。
        8. 不应编造没有依据的实例、时间、指标或根因。
        9. 报告应明确分析出预期具体故障原因：<TODO: 填写该用例期望 Hermes 诊断出的具体故障原因>。

        扣分规则：
        - 缺少实例、时间或故障类型，每项扣 1 到 2 分。
        - 只有通用建议、没有诊断分析，最高 5 分。
        - 未结合工具结果或观测数据，最高 6 分。
        - 根因明显错误，最高 4 分。
        - 报告与 CPU 高使用率无关，最高 3 分。
        - 未识别或错误识别预期具体故障原因，最高 6 分；如果其他分析也明显不足，最高 4 分。

        7 分及以上为通过。
      pass_threshold: 7

