# database-top-scene-handler CPU 具体故障原因诊断测试集
#
# 目的：
# - 测试 Hermes 是否路由到 database-top-scene-handler skill。
# - 测试 Hermes 是否能根据后端 mock 数据诊断出你定义的 CPU 具体故障原因。
# - 不测试 list_aksk_credentials / list_database_info 等 tool 路由；tool 路由测试放在 database-top-scene-handler.yaml。
#
# 后端 mock 约定：
# - 你后端使用字典存放 mock CPU 故障。
# - key 是故障时间点。
# - value 是该时间点对应的 mock 故障原因。
# - 每条用例的故障时间点都不同，方便你按 key 映射到具体故障。
#
# 每条用例必须包含：
# - 实例名称：rds-aiops-0001
# - 明确 CPU 故障时间点
# - 明确 CPU 故障类型
#
# 需要你填写：
# - expected_root_cause 中的 <TODO: ...>，填写对应 mock 字典 value。
# - rubric 第 9 条中的 <TODO: ...>，建议填写同一个 mock 字典 value。

- id: root-cause-cpu-mock-01
  type: qa
  prompt: "请诊断实例 rds-aiops-0001 在 2026-06-15 10:00 出现 CPU 使用率持续 95% 的故障，并给出诊断报告。"
  graders:
    - kind: tool_call
      must_call: skill_view
      args_match:
        name: database-top-scene-handler
      expect_success: true
    - kind: llm_judge
      expected_root_cause: "<TODO: 填写 mock 字典 key=1781488800000 对应的 CPU 具体故障原因>"
      rubric: &cpu_root_cause_rubric >
        请从 0 到 10 分评价 Hermes 生成的诊断报告。

        满分标准：
        1. 明确识别故障实例为 rds-aiops-0001。
        2. 明确识别故障时间与用户问题中的故障时间一致。
        3. 明确识别故障类型为 CPU 使用率过高。
        4. 报告应结合可观测数据或工具结果进行分析，不能只给泛泛建议。
        5. 报告应给出排查结论或最可能原因。
        6. 报告应给出可执行的处理建议，例如优化 SQL、限制异常请求、扩容、调整参数或继续观察指标。
        7. 不应编造没有依据的实例、时间、指标或根因。
        8. 报告应明确分析出 CPU 故障原因，而不是只说明 CPU 高。
        9. 报告应明确分析出预期具体故障原因：<TODO: 填写该用例期望 Hermes 诊断出的 CPU 具体故障原因>。

        扣分规则：
        - 缺少实例、时间或故障类型，每项扣 1 到 2 分。
        - 只有通用建议、没有诊断分析，最高 5 分。
        - 未结合工具结果或观测数据，最高 6 分。
        - 根因明显错误，最高 4 分。
        - 报告与 CPU 高使用率无关，最高 3 分。
        - 未识别或错误识别预期具体故障原因，最高 6 分；如果其他分析也明显不足，最高 4 分。

        7 分及以上为通过。
      pass_threshold: 7

