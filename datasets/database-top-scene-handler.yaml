# database-top-scene-handler skill 测试集
#
# 完整信息用例：
# - 必须加载 database-top-scene-handler skill。
# - 必须调用 list_aksk_credentials 和 list_database_info。
#
# 信息缺失用例：
# - 必须加载 database-top-scene-handler skill。
# - 应追问缺失的实例、故障时间或故障类型。
# - 信息补全前不应调用凭证和数据库连接工具。
#
# 当前不检查三个工具的调用顺序。

- id: cpu-instance-name-exact-time
  type: tool_use
  prompt: "请帮我诊断实例 rds-aiops-0001 在 2026-06-08 14:35 出现的 CPU 使用率持续 95% 问题。"
  graders: &complete_graders
    - kind: tool_call
      must_call: skill_view
      args_match:
        name: database-top-scene-handler
      expect_success: true
    - kind: tool_call
      must_call: list_aksk_credentials
      expect_success: true
    - kind: tool_call
      must_call: list_database_info
      expect_success: true

- id: cpu-instance-id-time-range
  type: tool_use
  prompt: "实例 ID rds-aiops-0001 在 2026-06-07 09:10 到 09:40 之间 CPU 突然打满了，帮我分析原因。"
  graders: *complete_graders

- id: cpu-colloquial-spike
  type: tool_use
  prompt: "昨天晚上 22:15 左右，实例 rds-aiops-0001 的 CPU 一直飙到 100%，麻烦排查一下。"
  graders: *complete_graders

- id: cpu-intermittent
  type: tool_use
  prompt: "诊断一下实例 rds-aiops-0001，2026-06-06 16:00 至 17:00 CPU 周期性升高的问题。"
  graders: *complete_graders

- id: memory-instance-name-exact-time
  type: tool_use
  prompt: "数据库实例 rds-aiops-0001 在 2026-06-08 11:20 内存使用率达到 98%，请做故障诊断。"
  graders: *complete_graders

- id: memory-instance-id-oom
  type: tool_use
  prompt: "实例 rds-aiops-0001 在 2026-06-05 03:18 疑似发生 OOM，内存几乎耗尽，请分析。"
  graders: *complete_graders

- id: memory-gradual-growth
  type: tool_use
  prompt: "rds-aiops-0001 从 2026-06-07 13:00 到 18:00 内存持续上涨没有回落，帮忙看看是什么原因。"
  graders: *complete_graders

- id: memory-colloquial
  type: tool_use
  prompt: "今天凌晨 01:30，实例 rds-aiops-0001 的内存突然爆了，帮我排查。"
  graders: *complete_graders

- id: disk-instance-name-full
  type: tool_use
  prompt: "实例 rds-aiops-0001 在 2026-06-08 08:45 磁盘使用率超过 90% 并持续增长，请诊断。"
  graders: *complete_graders

- id: disk-instance-id-full
  type: tool_use
  prompt: "请检查 rds-aiops-0001，2026-06-04 19:30 出现磁盘空间不足的问题。"
  graders: *complete_graders

- id: disk-io-high
  type: tool_use
  prompt: "rds-aiops-0001 在 2026-06-07 15:00 到 15:25 磁盘 IO 特别高，业务查询明显变慢，请分析。"
  graders: *complete_graders

- id: disk-growth-colloquial
  type: tool_use
  prompt: "昨天 10:00 左右，实例 rds-aiops-0001 的磁盘突然增长了很多，帮我查下原因。"
  graders: *complete_graders

- id: slow-sql-frequency-name
  type: tool_use
  prompt: "实例 rds-aiops-0001 在 2026-06-08 17:40 开始频繁出现慢 SQL，请定位原因。"
  graders: *complete_graders

- id: slow-sql-frequency-id
  type: tool_use
  prompt: "rds-aiops-0001 在 2026-06-06 12:00 到 13:00 慢查询数量暴增，麻烦诊断。"
  graders: *complete_graders

- id: slow-sql-business-impact
  type: tool_use
  prompt: "2026-06-07 20:10，实例 rds-aiops-0001 的接口响应突然变慢，监控显示慢 SQL 高频出现，请帮忙分析。"
  graders: *complete_graders

- id: slow-sql-colloquial
  type: tool_use
  prompt: "昨天下午 3 点左右，实例 rds-aiops-0001 一直刷慢 SQL，看看发生了什么。"
  graders: *complete_graders

- id: replication-delay-name
  type: tool_use
  prompt: "实例 rds-aiops-0001 在 2026-06-08 09:25 出现主从复制延迟，请诊断延迟原因。"
  graders: *complete_graders

- id: replication-delay-id
  type: tool_use
  prompt: "rds-aiops-0001 在 2026-06-05 21:00 到 22:00 复制延迟持续超过 600 秒，请排查。"
  graders: *complete_graders

- id: replication-delay-fluctuation
  type: tool_use
  prompt: "实例 rds-aiops-0001 昨天 18:30 左右复制延迟反复升高又恢复，帮我分析这个故障。"
  graders: *complete_graders

- id: replication-delay-business-impact
  type: tool_use
  prompt: "2026-06-07 14:50，实例 rds-aiops-0001 数据比主库落后很多，确认是复制延迟，请做诊断。"
  graders: *complete_graders

- id: replication-error-name
  type: tool_use
  prompt: "实例 rds-aiops-0001 在 2026-06-08 02:12 复制中断并报错，请帮我定位原因。"
  graders: *complete_graders

- id: replication-error-id
  type: tool_use
  prompt: "rds-aiops-0001 在 2026-06-03 23:45 出现复制异常，当前同步已经停止，请诊断。"
  graders: *complete_graders

- id: replication-error-sql-thread
  type: tool_use
  prompt: "实例 rds-aiops-0001 在 2026-06-06 06:30 SQL 线程停止，发生复制异常，请排查。"
  graders: *complete_graders

- id: replication-error-io-thread
  type: tool_use
  prompt: "昨天凌晨 04:20，实例 rds-aiops-0001 的 IO 线程报错，主从复制失败，麻烦分析。"
  graders: *complete_graders

- id: missing-instance
  type: clarification
  prompt: "2026-06-08 14:35 数据库 CPU 使用率一直是 95%，帮我诊断。"
  graders: &clarification_graders
    - kind: tool_call
      must_call: skill_view
      args_match:
        name: database-top-scene-handler
      expect_success: true
      must_not_call:
        - list_aksk_credentials
        - list_database_info
    - kind: llm_judge
      rubric: "回答应明确询问数据库实例名称或实例 ID；不得假设具体实例，不得声称已经完成诊断。"
      pass_threshold: 7

- id: missing-time
  type: clarification
  prompt: "实例 rds-aiops-0001 的 CPU 突然打满了，帮我分析。"
  graders:
    - kind: tool_call
      must_call: skill_view
      args_match:
        name: database-top-scene-handler
      expect_success: true
      must_not_call:
        - list_aksk_credentials
        - list_database_info
    - kind: llm_judge
      rubric: "回答应明确询问 CPU 故障发生的具体时间或时间范围；不得假设故障时间，不得声称已经完成诊断。"
      pass_threshold: 7

- id: missing-fault-type
  type: clarification
  prompt: "请帮我看一下实例 rds-aiops-0001 在 2026-06-08 14:35 的故障。"
  graders:
    - kind: tool_call
      must_call: skill_view
      args_match:
        name: database-top-scene-handler
      expect_success: true
      must_not_call:
        - list_aksk_credentials
        - list_database_info
    - kind: llm_judge
      rubric: "回答应询问具体发生了哪类故障或异常现象，例如 CPU、内存、磁盘、慢 SQL、复制延迟或复制异常；不得猜测故障类型。"
      pass_threshold: 7

- id: missing-instance-and-time
  type: clarification
  prompt: "数据库出现了大量慢 SQL，帮忙排查一下。"
  graders:
    - kind: tool_call
      must_call: skill_view
      args_match:
        name: database-top-scene-handler
      expect_success: true
      must_not_call:
        - list_aksk_credentials
        - list_database_info
    - kind: llm_judge
      rubric: "回答应同时询问实例名称或实例 ID，以及慢 SQL 高频发生的具体时间或时间范围。"
      pass_threshold: 7

- id: missing-time-and-fault
  type: clarification
  prompt: "帮我诊断一下实例 rds-aiops-0001。"
  graders:
    - kind: tool_call
      must_call: skill_view
      args_match:
        name: database-top-scene-handler
      expect_success: true
      must_not_call:
        - list_aksk_credentials
        - list_database_info
    - kind: llm_judge
      rubric: "回答应询问故障发生时间或时间范围，并询问具体故障类型或异常现象。"
      pass_threshold: 7

- id: missing-all-information
  type: clarification
  prompt: "帮我看看数据库怎么了。"
  graders:
    - kind: tool_call
      must_call: skill_view
      args_match:
        name: database-top-scene-handler
      expect_success: true
      must_not_call:
        - list_aksk_credentials
        - list_database_info
    - kind: llm_judge
      rubric: "回答应询问实例名称或实例 ID、故障发生时间或时间范围、以及具体故障类型或异常现象，不得直接猜测并执行诊断。"
      pass_threshold: 7
