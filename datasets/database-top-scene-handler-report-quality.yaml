# database-top-scene-handler 诊断报告质量测试集
#
# 目的：
# - 测试 Hermes 是否路由到 database-top-scene-handler skill。
# - 测试 Hermes 对数据库 TOP 故障场景生成的诊断报告是否符合报告规范。
# - 不测试具体故障根因是否正确；根因测试放在 database-top-scene-handler-root-cause-quality.yaml。
# - 不测试 list_aksk_credentials / list_database_info 等 tool 路由；tool 路由测试放在 database-top-scene-handler.yaml。
#
# 每条用例必须包含：
# - 实例名称：rds-aiops-0001
# - 明确故障时间点
# - 明确故障类型
#
# 评分规则：
# - rubric 只检查报告规范，不检查具体根因是否正确。
# - pass_threshold 可按需调整，默认先放 7。

- id: report-cpu-sustained-high
  type: qa
  prompt: "请诊断实例 rds-aiops-0001 在 2026-06-08 14:35 出现 CPU 使用率持续 95% 的故障，并给出诊断报告。"
  graders:
    - kind: tool_call
      must_call: skill_view
      args_match:
        name: database-top-scene-handler
      expect_success: true
    - kind: llm_judge
      rubric: >
        请从 0 到 10 分评价 Hermes 生成的诊断报告是否符合报告规范。

        满分标准：
        1. 明确写出故障实例 rds-aiops-0001。
        2. 明确写出用户问题中的故障时间。
        3. 明确写出用户问题中的故障类型。
        4. 报告结构清晰，应包含故障概述、诊断分析、结论或状态判断、处理建议。
        5. 诊断分析应结合可观测数据或工具结果进行说明，不能只输出空泛模板。
        6. 处理建议应可执行，例如指出需要检查、优化、调整、扩容、修复或继续观察的方向。
        7. 不应编造没有依据的实例、时间、指标、工具结果或事实。
        8. 表达应清楚、完整，避免只给一句话结论。

        扣分规则：
        - 缺少实例、时间或故障类型，每项扣 1 到 2 分。
        - 缺少故障概述、诊断分析、结论或处理建议，每项扣 1 到 2 分。
        - 只有通用建议、没有结合数据或工具结果，最高 6 分。
        - 报告内容过短、结构混乱或难以执行，最高 6 分。
        - 编造明显不存在的实例、时间、指标或工具结果，最高 5 分。

        7 分及以上为通过。
      pass_threshold: 7

